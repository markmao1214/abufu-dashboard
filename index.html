<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>阿福交易儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.44.0/dist/apexcharts.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #080C10; }
body {
  color: #C8D8E8;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg:       #080C10;
  --surface:  #0F1520;
  --surface2: #141E2D;
  --border:   #1C2B3A;
  --short:    #FF4560;
  --short-bg: rgba(255,69,96,0.12);
  --long:     #00D97A;
  --long-bg:  rgba(0,217,122,0.12);
  --gold:     #F0B429;
  --gold-bg:  rgba(240,180,41,0.12);
  --text:     #C8D8E8;
  --text-dim: #5A7A94;
  --text-bright: #EAF4FF;
}

/* ── Header ─────────────────────────────────── */
.header {
  background: linear-gradient(160deg, #0A1628 0%, #0D1E38 100%);
  border-bottom: 1px solid #1A3050;
  padding: 14px 16px 10px;
  text-align: center;
}
.header-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1px;
}
.header-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}
.header-date {
  display: inline-block;
  background: rgba(240,180,41,0.1);
  border: 1px solid rgba(240,180,41,0.35);
  border-radius: 4px;
  padding: 2px 12px;
  font-size: 12px;
  color: var(--gold);
  margin-top: 6px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ── Tabs ────────────────────────────────────── */
.tabs {
  display: flex;
  background: #080C10;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.tab-btn {
  flex: 1;
  padding: 11px 0;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Section ─────────────────────────────────── */
.section { padding: 12px 12px 0; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 9px;
}
.section-bar {
  display: inline-block;
  width: 3px;
  height: 13px;
  border-radius: 2px;
}
.bar-short { background: var(--short); }
.bar-long  { background: var(--long);  }
.bar-gold  { background: var(--gold);  }

/* ── Recommendation Cards (horizontal scroll) ── */
.rec-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.rec-scroll::-webkit-scrollbar { display: none; }

.rec-card {
  flex: 0 0 155px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 11px 10px 9px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.rec-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 9px 9px 0 0;
}
.rec-card.short::after { background: linear-gradient(90deg, var(--short) 0%, transparent 100%); }
.rec-card.long::after  { background: linear-gradient(90deg, var(--long)  0%, transparent 100%); }

.rec-card:hover, .rec-card.active {
  border-color: var(--gold);
  box-shadow: 0 0 14px rgba(240,180,41,0.2);
}

.rec-score {
  position: absolute;
  top: 9px; right: 8px;
  font-size: 10px;
  background: var(--gold-bg);
  border: 1px solid rgba(240,180,41,0.35);
  border-radius: 3px;
  padding: 2px 5px;
  color: var(--gold);
  font-weight: 600;
}
.rec-rank {
  font-size: 26px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 3px;
}
.rec-card.short .rec-rank { color: var(--short); }
.rec-card.long  .rec-rank { color: var(--long);  }

.rec-name { font-size: 15px; font-weight: 700; color: var(--text-bright); }
.rec-code { font-size: 11px; color: var(--text-dim); margin-bottom: 7px; }

.rec-price {
  font-size: 15px;
  font-weight: 700;
  font-family: 'SF Mono', 'Menlo', monospace;
  margin-bottom: 4px;
}
.c-up   { color: var(--short); }  /* 台股：漲 = 紅 */
.c-down { color: var(--long);  }
.c-flat { color: var(--text);  }

.rec-stars { font-size: 12px; letter-spacing: 1px; }
.s-on  { color: var(--gold); }
.s-off { color: #1E2D3D; }
.rec-risk-lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── Alert ───────────────────────────────────── */
.alert-wrap { padding: 0 12px; }
.alert-item {
  background: var(--surface);
  border: 1px solid rgba(240,180,41,0.25);
  border-left: 3px solid var(--gold);
  border-radius: 7px;
  padding: 10px 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.alert-name { font-size: 14px; font-weight: 600; color: var(--text-bright); }
.alert-prices { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.alert-badge {
  flex: 0 0 auto;
  font-size: 10px;
  font-weight: 600;
  background: var(--gold-bg);
  border: 1px solid rgba(240,180,41,0.4);
  border-radius: 4px;
  padding: 3px 8px;
  color: var(--gold);
  white-space: nowrap;
}

/* ── Chart section ───────────────────────────── */
.chart-section { padding: 10px 12px 0; }

.stock-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}
.stock-tabs::-webkit-scrollbar { display: none; }
.stock-tab {
  flex: 0 0 auto;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  white-space: nowrap;
  transition: all 0.15s;
}
.stock-tab.short-type { border-left: 2px solid var(--short); }
.stock-tab.long-type  { border-left: 2px solid var(--long);  }
.stock-tab.sel-short  { background: var(--short-bg); border-color: var(--short); color: var(--short); }
.stock-tab.sel-long   { background: var(--long-bg);  border-color: var(--long);  color: var(--long);  }

/* ── Chart Stock Info bar ─────────────────────── */
.chart-info {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 8px 0 6px;
}
.ci-name { font-size: 20px; font-weight: 700; color: var(--text-bright); }
.ci-code { font-size: 12px; color: var(--text-dim); }
.ci-price {
  font-size: 24px;
  font-weight: 700;
  font-family: 'SF Mono', monospace;
  text-align: right;
}
.ci-change { font-size: 11px; text-align: right; margin-top: 1px; }
.ci-vol    { font-size: 10px; color: var(--text-dim); text-align: right; }

/* ── Chart Legend ────────────────────────────── */
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 6px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--text-dim);
}
.leg-line { width: 18px; height: 2px; border-radius: 1px; }
.leg-dash { width: 18px; height: 0; border-top: 2px dashed; }

/* ── Charts ──────────────────────────────────── */
#main-chart {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 290px;
}
#volume-chart {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 85px;
  margin-top: 4px;
}
.no-chart {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 13px;
}

/* ── Analysis Panel ──────────────────────────── */
.analysis-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
  padding-bottom: 14px;
}
.ap-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.ap-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.ap-text {
  font-size: 11px;
  color: var(--text);
  line-height: 1.65;
  word-break: break-all;
}
.ap-text .stag { color: var(--gold); font-weight: 700; }

.stars-lg {
  font-size: 21px;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.risk-badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
}
.rl1 { background: rgba(90,122,148,0.15); color:#5A7A94; border:1px solid #2A3A4A; }
.rl2 { background: rgba(41,182,246,0.12); color:#29B6F6; border:1px solid rgba(41,182,246,0.3); }
.rl3 { background: var(--gold-bg);         color:var(--gold); border:1px solid rgba(240,180,41,0.35); }
.rl4 { background: rgba(255,120,50,0.12);  color:#FF7832; border:1px solid rgba(255,120,50,0.3); }
.rl5 { background: var(--short-bg);        color:var(--short); border:1px solid rgba(255,69,96,0.35); }

/* ── History ─────────────────────────────────── */
.hist-wrap { overflow-x: auto; padding: 12px; }
.hist-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.hist-table th {
  background: var(--surface2);
  color: var(--text-dim);
  padding: 8px;
  text-align: left;
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}
.hist-table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
.hist-table tr:hover td { background: var(--surface2); }
.bdg-s { background: var(--short-bg); color: var(--short); border: 1px solid rgba(255,69,96,0.3); border-radius:3px; padding:1px 6px; font-size:10px; }
.bdg-l { background: var(--long-bg);  color: var(--long);  border: 1px solid rgba(0,217,122,0.3); border-radius:3px; padding:1px 6px; font-size:10px; }

/* ── Stats ───────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.stat-num { font-size: 30px; font-weight: 800; color: var(--gold); font-family: 'SF Mono', monospace; }
.stat-lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ── Utilities ───────────────────────────────── */
.empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px; }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
    <script>
        // 儀表板資料已嵌入（由 html_generator.py 自動注入）
        window.dashboardData = {"date": "20260506", "updated_at": "2026-05-06 11:34:58", "daily_recommendations": {"short": [], "long": [], "disposal_alert": []}, "price_data": {}, "history": [], "metadata": {"bollinger_period": 20, "bollinger_std_dev": 2, "history_days": 30, "total_recommendations": 0, "total_history_records": 0}};
    </script>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">🎯 阿福交易儀表板</div>
  <div class="header-sub" id="updated-time">載入中...</div>
  <div class="header-date" id="date-badge">--</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="daily">今日推薦</button>
  <button class="tab-btn" data-tab="history">歷史回溯</button>
  <button class="tab-btn" data-tab="statistics">統計分析</button>
</div>

<!-- ══ 今日推薦 ══ -->
<div id="daily" class="tab-content active">

  <div class="section" style="margin-top:12px">
    <div class="section-title"><span class="section-bar bar-short"></span>空方推薦 Top 3</div>
    <div class="rec-scroll" id="short-list"><div class="empty"><div class="spinner"></div></div></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-bar bar-long"></span>多方推薦 Top 3</div>
    <div class="rec-scroll" id="long-list"><div class="empty"><div class="spinner"></div></div></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-bar bar-gold"></span>注意處置預警</div>
  </div>
  <div class="alert-wrap" id="alert-list"><div class="empty">無預警</div></div>

  <!-- 技術圖表 -->
  <div class="chart-section">
    <div class="section-title"><span class="section-bar bar-gold"></span>技術圖表</div>
    <div class="stock-tabs" id="stock-selector"></div>
    <div id="chart-info" style="display:none" class="chart-info">
      <div>
        <div class="ci-name" id="ci-name">—</div>
        <div class="ci-code" id="ci-code">—</div>
      </div>
      <div>
        <div class="ci-price" id="ci-price">—</div>
        <div class="ci-change" id="ci-change">—</div>
        <div class="ci-vol" id="ci-vol">—</div>
      </div>
    </div>
    <div class="chart-legend" id="chart-legend" style="display:none">
      <div class="leg-item"><div class="leg-line" style="background:#F0B429"></div>20日均線</div>
      <div class="leg-item"><div class="leg-dash" style="border-color:#FF4560"></div>布林上軌</div>
      <div class="leg-item"><div class="leg-dash" style="border-color:#00D97A"></div>布林下軌</div>
      <div class="leg-item"><div class="leg-line" style="background:#FF4560;width:14px;height:3px"></div>阻力</div>
      <div class="leg-item"><div class="leg-line" style="background:#00D97A;width:14px;height:3px"></div>支撐</div>
    </div>
    <div id="main-chart"><div class="no-chart">請選擇標的</div></div>
    <div id="volume-chart"></div>
    <div class="analysis-panel" id="analysis-panel" style="display:none">
      <div class="ap-card">
        <div class="ap-title">籌碼分析</div>
        <div class="ap-text" id="chip-text">—</div>
      </div>
      <div class="ap-card">
        <div class="ap-title">主力出貨警示</div>
        <div class="stars-lg" id="warn-stars">—</div>
        <div id="warn-badge">—</div>
      </div>
    </div>
  </div>

</div>

<!-- ══ 歷史回溯 ══ -->
<div id="history" class="tab-content">
  <div class="hist-wrap">
    <table class="hist-table">
      <thead><tr><th>日期</th><th>代號</th><th>名稱</th><th>類型</th><th>評分</th></tr></thead>
      <tbody id="history-tbody"><tr><td colspan="5" class="empty"><div class="spinner"></div></td></tr></tbody>
    </table>
  </div>
</div>

<!-- ══ 統計分析 ══ -->
<div id="statistics" class="tab-content">
  <div class="stat-grid" id="stat-grid"><div class="empty"><div class="spinner"></div></div></div>
</div>

<script>
    let dashboardData = null;
    let mainChart = null;
    let volumeChart = null;
    let currentCode = null;
    let currentItem = null;

    // ── Tab 切換
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    // ── 資料載入（html_generator.py 會在 <head> 注入 window.dashboardData）──────
    async function loadDashboardData() {
        if (window.dashboardData) {
            dashboardData = window.dashboardData;
            renderDashboard();
            return;
        }
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const dataUrl = urlParams.get('data') || 'dashboard_data.json';
            const res = await fetch(dataUrl);
            if (!res.ok) throw new Error('無法加載資料');
            dashboardData = await res.json();
            renderDashboard();
        } catch(e) {
            document.body.innerHTML = `<div style="padding:40px;text-align:center;color:#5A7A94">
                <p style="font-size:18px;margin-bottom:8px">❌ 無法加載儀表板資料</p>
                <p style="font-size:13px">${e.message}</p></div>`;
        }
    }

    // ── 星級工具
    function starsHTML(score, size='') {
        const n = score >= 80 ? 5 : score >= 60 ? 4 : score >= 40 ? 3 : score >= 20 ? 2 : 1;
        return Array.from({length:5}, (_,i) =>
            `<span class="${i<n?'s-on':'s-off'}">★</span>`).join('');
    }
    function starInfo(score) {
        if (score >= 80) return ['極度警戒','rl5'];
        if (score >= 60) return ['高度警戒','rl4'];
        if (score >= 40) return ['中度觀察','rl3'];
        if (score >= 20) return ['輕度觀察','rl2'];
        return ['低度觀察','rl1'];
    }

    // ── 主渲染
    function renderDashboard() {
        if (!dashboardData) return;
        document.getElementById('updated-time').textContent = `更新時間：${dashboardData.updated_at}`;
        const d = dashboardData.date;
        document.getElementById('date-badge').textContent = `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
        renderRecommendations();
        renderAlerts();
        buildStockSelector();
        renderHistory();
        renderStatistics();
    }

    // ── 推薦卡片
    function renderRecommendations() {
        const { short=[], long=[] } = dashboardData.daily_recommendations;
        document.getElementById('short-list').innerHTML = short.length
            ? short.map(r => recCard(r,'short')).join('') : '<div class="empty">今日無做空推薦</div>';
        document.getElementById('long-list').innerHTML = long.length
            ? long.map(r => recCard(r,'long')).join('') : '<div class="empty">今日無做多推薦</div>';
    }

    function recCard(item, type) {
        const price = item.price > 0 ? `NT$${Number(item.price).toLocaleString()}` : 'N/A';
        const priceClass = item.price > 0 ? (type==='short' ? 'c-up' : 'c-down') : 'c-flat';
        const score = item.risk_score ?? 50;
        const [lbl] = starInfo(score);
        return `
        <div class="rec-card ${type}" onclick="showChart('${item.code}')" data-code="${item.code}">
          <div class="rec-score">評分 ${item.score}</div>
          <div class="rec-rank">${item.rank}</div>
          <div class="rec-name">${item.name}</div>
          <div class="rec-code">${item.code}</div>
          <div class="rec-price ${priceClass}">${price}</div>
          <div class="rec-stars">${starsHTML(score)}</div>
          <div class="rec-risk-lbl">${lbl}</div>
        </div>`;
    }

    // ── 處置預警
    function renderAlerts() {
        const alerts = dashboardData.daily_recommendations.disposal_alert ?? [];
        document.getElementById('alert-list').innerHTML = alerts.length
            ? alerts.map(a => `
              <div class="alert-item">
                <div>
                  <div class="alert-name">${a.code} ${a.name}</div>
                  <div class="alert-prices">漲停門檻：NT$${a.upper_price?.toFixed(2)??'—'} ／ 跌停門檻：NT$${a.lower_price?.toFixed(2)??'—'}</div>
                </div>
                <div class="alert-badge">${a.status}</div>
              </div>`).join('')
            : '<div class="empty">目前無注意處置標的</div>';
    }

    // ── 股票選擇器
    function buildStockSelector() {
        const { short=[], long=[] } = dashboardData.daily_recommendations;
        const codes = [
            ...short.map(r=>({code:r.code,name:r.name,type:'short'})),
            ...long.map(r=>({code:r.code,name:r.name,type:'long'}))
        ];
        document.getElementById('stock-selector').innerHTML = codes.map(c=>`
            <div class="stock-tab ${c.type}-type" onclick="showChart('${c.code}')" data-code="${c.code}">
                ${c.code} ${c.name}
            </div>`).join('');
        if (codes.length > 0) showChart(codes[0].code);
    }

    // ── 顯示圖表
    function showChart(code) {
        currentCode = code;
        const { short=[], long=[] } = dashboardData.daily_recommendations;
        currentItem = [...short,...long].find(r=>r.code===code) || null;

        // 更新 tab 狀態
        document.querySelectorAll('.stock-tab').forEach(t => {
            t.classList.remove('sel-short','sel-long');
            if (t.dataset.code === code) {
                t.classList.add(t.classList.contains('short-type') ? 'sel-short' : 'sel-long');
            }
        });

        // 更新 stock info bar
        const infoEl = document.getElementById('chart-info');
        if (currentItem) {
            infoEl.style.display = 'flex';
            document.getElementById('ci-name').textContent  = currentItem.name;
            document.getElementById('ci-code').textContent  = currentItem.code;
            const p = currentItem.price;
            document.getElementById('ci-price').textContent = p > 0 ? `NT$${Number(p).toLocaleString()}` : 'N/A';
            document.getElementById('ci-price').className   = 'ci-price ' + (p>0?(currentItem.type==='short'?'c-up':'c-down'):'c-flat');
            document.getElementById('ci-change').textContent = '';
            document.getElementById('ci-vol').textContent    = '';
        } else {
            infoEl.style.display = 'none';
        }

        const data = dashboardData.price_data?.[code];
        if (!data || !data.closes?.length) {
            document.getElementById('main-chart').innerHTML = '<div class="no-chart">此標的無 K 線資料（非交易時段）</div>';
            if (volumeChart) { volumeChart.destroy(); volumeChart = null; }
            document.getElementById('volume-chart').innerHTML = '';
            document.getElementById('analysis-panel').style.display = 'none';
            document.getElementById('chart-legend').style.display = 'none';
            return;
        }

        document.getElementById('chart-legend').style.display = 'flex';
        renderMainChart(code, data);
        renderVolumeChart(code, data);
        renderAnalysisPanel();
    }

    // ── K 線主圖
    function renderMainChart(code, data) {
        if (mainChart) { mainChart.destroy(); mainChart = null; }

        const candleData = data.dates.map((d,i) => ({
            x: new Date(d).getTime(),
            y: [data.highs?.[i]??data.closes[i], data.highs?.[i]??data.closes[i],
                data.lows?.[i]??data.closes[i],  data.closes[i]]
        }));

        const series = [{ name: 'K線', type: 'candlestick', data: candleData }];

        const bb = data.bollinger_bands;
        if (bb?.sma?.length) {
            const mkLine = (arr, name) => ({
                name, type: 'line',
                data: data.dates.map((d,i) => arr[i]!=null ? {x:new Date(d).getTime(),y:arr[i]} : null).filter(Boolean)
            });
            series.push(mkLine(bb.sma,   '20日均線'));
            series.push(mkLine(bb.upper, '布林上軌'));
            series.push(mkLine(bb.lower, '布林下軌'));
        }

        // annotations
        const annotations = { yaxis: [] };
        const sr = data.support_resistance ?? {};

        if (sr.resistance > 0) annotations.yaxis.push({
            y: sr.resistance, borderColor: '#FF4560', borderWidth: 1, strokeDashArray: 5, opacity: 0.8,
            label: { text: `阻力 ${sr.resistance}`, position: 'right',
                style: { background:'rgba(255,69,96,0.15)', color:'#FF4560', fontSize:'10px', fontWeight:600,
                    padding:{left:5,right:5,top:2,bottom:2}, border:{width:1,color:'rgba(255,69,96,0.4)'} } }
        });
        if (sr.support > 0) annotations.yaxis.push({
            y: sr.support, borderColor: '#00D97A', borderWidth: 1, strokeDashArray: 5, opacity: 0.8,
            label: { text: `支撐 ${sr.support}`, position: 'right',
                style: { background:'rgba(0,217,122,0.15)', color:'#00D97A', fontSize:'10px', fontWeight:600,
                    padding:{left:5,right:5,top:2,bottom:2}, border:{width:1,color:'rgba(0,217,122,0.4)'} } }
        });

        // 建議空點 / 建議停損
        if (currentItem?.advice) {
            const adv = currentItem.advice;
            if (adv.entry > 0) annotations.yaxis.push({
                y: adv.entry, borderColor: '#F0B429', borderWidth: 1.5, strokeDashArray: 0, opacity: 1,
                label: { text: `建議空點：${adv.entry}`, position: 'left',
                    style: { background:'rgba(240,180,41,0.18)', color:'#F0B429', fontSize:'10px', fontWeight:700,
                        padding:{left:7,right:7,top:3,bottom:3}, border:{width:1,color:'rgba(240,180,41,0.5)'} } }
            });
            if (adv.stop_loss > 0) annotations.yaxis.push({
                y: adv.stop_loss, borderColor: '#FF4560', borderWidth: 1.5, strokeDashArray: 6, opacity: 1,
                label: { text: `建議停損：${adv.stop_loss}`, position: 'left',
                    style: { background:'rgba(255,69,96,0.18)', color:'#FF4560', fontSize:'10px', fontWeight:700,
                        padding:{left:7,right:7,top:3,bottom:3}, border:{width:1,color:'rgba(255,69,96,0.5)'} } }
            });
        }

        const opts = {
            chart: {
                type: 'candlestick', height: 300, id: 'candles', group: 'stock',
                background: '#0F1520', foreColor: '#5A7A94',
                toolbar: { show: true, tools: { download:false, selection:true, zoom:true, zoomin:true, zoomout:true, pan:true, reset:true } },
                animations: { enabled: false },
            },
            theme: { mode: 'dark' },
            series,
            annotations,
            colors: ['#F0B429','#FF4560','#00D97A'],
            stroke: { width:[1,1.5,1,1], dashArray:[0,0,4,4], curve:'smooth' },
            xaxis: {
                type: 'datetime',
                labels: { style: { colors:'#5A7A94', fontSize:'10px' } },
                axisBorder: { color:'#1C2B3A' }, axisTicks: { color:'#1C2B3A' }
            },
            yaxis: {
                labels: { style: { colors:'#5A7A94', fontSize:'10px' }, formatter: v => v?.toFixed(1) },
                tooltip: { enabled: true }
            },
            grid: { borderColor: '#1C2B3A' },
            plotOptions: {
                candlestick: { colors: { upward:'#FF4560', downward:'#00D97A' }, wick: { useFillColor:true } }
            },
            tooltip: { theme:'dark', x: { format:'yyyy/MM/dd' } },
            legend: { show: false }
        };

        mainChart = new ApexCharts(document.getElementById('main-chart'), opts);
        mainChart.render();
    }

    // ── 成交量圖
    function renderVolumeChart(code, data) {
        if (volumeChart) { volumeChart.destroy(); volumeChart = null; }
        if (!data.volumes?.length) return;

        const volData = data.dates.map((d,i) => ({ x:new Date(d).getTime(), y:data.volumes[i] }));
        const colors  = data.dates.map((_,i) => i===0?'#5A7A94' : data.closes[i]>=data.closes[i-1]?'#FF4560':'#00D97A');

        const opts = {
            chart: {
                type:'bar', height:90, id:'volume', group:'stock',
                background:'#0F1520', foreColor:'#5A7A94',
                toolbar:{ show:false }, animations:{ enabled:false },
                brush:{ target:'candles', enabled:true }
            },
            theme: { mode:'dark' },
            series: [{ name:'成交量', data:volData }],
            colors, fill:{ colors },
            plotOptions: { bar: { columnWidth:'80%' } },
            xaxis: { type:'datetime', labels:{ show:false }, axisBorder:{ color:'#1C2B3A' } },
            yaxis: { labels: {
                formatter: v => v>1000000?`${(v/1000000).toFixed(1)}M`:`${(v/1000).toFixed(0)}K`,
                style: { colors:'#5A7A94', fontSize:'9px' }
            }},
            grid: { borderColor:'#1C2B3A' },
            tooltip: { theme:'dark', x:{ format:'yyyy/MM/dd' }, y:{ formatter: v => v?.toLocaleString()+' 張' } },
            legend: { show:false }
        };

        volumeChart = new ApexCharts(document.getElementById('volume-chart'), opts);
        volumeChart.render();
    }

    // ── 底部分析面板
    function renderAnalysisPanel() {
        const panel = document.getElementById('analysis-panel');
        if (!currentItem) { panel.style.display='none'; return; }
        panel.style.display = 'grid';

        // 籌碼分析：格式化理由，策略標籤金色
        const reason = (currentItem.reason || '—');
        const html = reason.split('；').map(s => {
            if (/★|高檔出貨|月下彎|價籌背離|布林開口|強勢回測|主力連買/.test(s))
                return `<span class="stag">${s}</span>`;
            return s;
        }).join('；');
        document.getElementById('chip-text').innerHTML = html;

        // 主力出貨警示
        const score = currentItem.risk_score ?? 50;
        const [lbl, cls] = starInfo(score);
        document.getElementById('warn-stars').innerHTML = starsHTML(score);
        document.getElementById('warn-badge').innerHTML = `<span class="risk-badge ${cls}">${lbl}</span>`;
    }

    // ── 歷史回溯
    function renderHistory() {
        const history = dashboardData.history ?? [];
        document.getElementById('history-tbody').innerHTML = history.length
            ? history.map(h => `<tr>
                <td>${h.date?.slice(0,4)}/${h.date?.slice(4,6)}/${h.date?.slice(6,8)}</td>
                <td>${h.code}</td><td>${h.name}</td>
                <td><span class="bdg-${h.type==='short'?'s':'l'}">${h.type==='short'?'做空':'做多'}</span></td>
                <td>${h.score}</td></tr>`).join('')
            : '<tr><td colspan="5" class="empty">尚無歷史記錄</td></tr>';
    }

    // ── 統計分析
    function renderStatistics() {
        const meta = dashboardData.metadata ?? {};
        const hist = dashboardData.history ?? [];
        document.getElementById('stat-grid').innerHTML = [
            { num: meta.total_recommendations??0, lbl:'今日推薦' },
            { num: meta.total_history_records??0,  lbl:'歷史記錄' },
            { num: hist.filter(h=>h.type==='short').length, lbl:'空方歷史' },
            { num: hist.filter(h=>h.type==='long').length,  lbl:'多方歷史' },
        ].map(s=>`<div class="stat-box"><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
    }

    loadDashboardData();
</script>
</body>
</html>
