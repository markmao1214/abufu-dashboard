*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #080C10; }
body {
  color: #C8D8E8;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  font-size: 18px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
:root {
  --bg:       #080C10;
  --surface:  #0F1520;
  --surface2: #141E2D;
  --border:   #1C2B3A;
  --short:    #00D97A;
  --short-bg: rgba(0,217,122,0.12);
  --long:     #FF4560;
  --long-bg:  rgba(255,69,96,0.12);
  --gold:     #F0B429;
  --gold-bg:  rgba(240,180,41,0.12);
  --text:     #C8D8E8;
  --text-dim: #5A7A94;
  --text-bright: #EAF4FF;
}

/* ── Header ─────────────────────────────────── */
.header {
  background: linear-gradient(135deg, #1C0E04 0%, #2E1A08 50%, #1A1106 100%);
  border-bottom: 2px solid #4A2E0A;
  display: flex;
  align-items: stretch;
  height: 88px;
  overflow: hidden;
}
.header-photo {
  width: 88px;
  height: 88px;
  object-fit: cover;
  object-position: 20% top;
  flex-shrink: 0;
}
.header-body {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
}
.header-title {
  font-size: 30px;
  font-weight: 900;
  color: #FFFFFF;
  letter-spacing: 3px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.6);
}
.header-date {
  margin-left: auto;
  background: rgba(240,180,41,0.15);
  border: 1px solid rgba(240,180,41,0.5);
  border-radius: 6px;
  padding: 6px 16px;
  font-size: 17px;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 1px;
  white-space: nowrap;
}

/* ── Tabs ────────────────────────────────────── */
.tabs {
  display: flex;
  background: #080C10;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.tab-btn {
  flex: 1;
  padding: 15px 0;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Section Title ───────────────────────────── */
.section { padding: 14px 14px 0; }
.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.section-bar {
  display: inline-block;
  width: 3px;
  height: 16px;
  border-radius: 2px;
}
.bar-short { background: var(--short); }
.bar-long  { background: var(--long);  }
.bar-gold  { background: var(--gold);  }

/* ── Stock Selector（雙排）────────────────────── */
/* ── 推薦卡片清單 ─────────────────────────────── */
.rec-section {
  padding: 10px 14px 2px;
}
.rec-section-title {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.rec-section-title.lbl-short { color: var(--short); }
.rec-section-title.lbl-long  { color: var(--long);  }
.rec-card {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 8px 14px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.rec-card.short-card { border-left: 3px solid rgba(0,217,122,0.4); }
.rec-card.long-card  { border-left: 3px solid rgba(255,69,96,0.4); }
.rec-card.sel.short-card { background: var(--short-bg); border-color: var(--short); }
.rec-card.sel.long-card  { background: var(--long-bg);  border-color: var(--long);  }
.rc-left  { flex: 1; min-width: 0; }
.rc-name  { font-size: 20px; font-weight: 700; color: var(--text-bright); white-space: nowrap; }
.rc-strats {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 240px;
}
.rc-right { text-align: right; flex-shrink: 0; margin-left: 14px; }
.rc-price  { font-size: 22px; font-weight: 800; font-family: 'SF Mono','Menlo',monospace; color: var(--text-bright); }
.rc-change { font-size: 15px; margin-top: 1px; }

/* ── Chart Panel（inline，跟著卡片展開）────────── */
#chart-panel {
  margin: 0 14px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Chart Section ───────────────────────────── */
.chart-section { padding: 10px 14px 0; }

/* ── Chart Info Bar ──────────────────────────── */
.chart-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0 8px;
}
.ci-left {}
.ci-name-row {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}
.ci-name  { font-size: 28px; font-weight: 800; color: var(--text-bright); }
.ci-price { font-size: 38px; font-weight: 900; font-family: 'SF Mono','Menlo',monospace; line-height: 1; }
.ci-code  { font-size: 15px; color: var(--text-dim); margin-top: 2px; }
.ci-right { display: flex; gap: 22px; align-items: center; flex-shrink: 0; }
.ci-stat  { text-align: center; }
.ci-stat-label { font-size: 18px; font-weight: 800; color: #FFFFFF; }
.ci-stat-value { font-size: 24px; font-weight: 800; font-family: 'SF Mono',monospace; margin-top: 1px; color: #FFFFFF; }
.cv-short { color: var(--short); }
.cv-long  { color: var(--long);  }
.cv-loss  { color: #FF6B6B; }
.cv-up    { color: #FF4560; }   /* 紅K = 漲 */
.cv-down  { color: #00D97A; }   /* 黑K = 跌 */

/* ── Analysis Row（籌碼 + 主力警示）─────────── */
.analysis-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.analysis-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  min-width: 0;
}
.analysis-card.chip-card  { border-left: 3px solid var(--gold); }
.analysis-card.warn-card  { border-left: 3px solid #C084FC; text-align: center; }
.ac-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-align: center;
  text-transform: uppercase;
}
/* 觸發策略 pill */
.strat-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.strat-pill {
  display: inline-block;
  background: rgba(240,180,41,0.10);
  border: 1px solid rgba(240,180,41,0.28);
  border-radius: 4px;
  padding: 3px 9px;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  white-space: nowrap;
}
/* 策略強度 dots */
.dot-row {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin: 8px 0 6px;
}
.dot-on  { width: 13px; height: 13px; border-radius: 50%; background: #C084FC; }
.dot-off { width: 13px; height: 13px; border-radius: 50%; background: #1E2A38; border: 1px solid #2A3A4A; }
.strat-count {
  font-size: 24px;
  font-weight: 900;
  color: #C084FC;
  line-height: 1;
}
.strat-count-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 3px;
}

/* ── Chart Legend ────────────────────────────── */
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 8px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--text-dim);
}
.leg-line { width: 20px; height: 2px; border-radius: 1px; }
.leg-dash { width: 20px; height: 0; border-top: 2px dashed; }

/* ── Charts ──────────────────────────────────── */
#main-chart {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 300px;
}
#main-chart:empty {
  min-height: 300px;
}
/* 工具列移到日期軸下方 */
#main-chart .apexcharts-toolbar {
  top: auto !important;
  bottom: -32px !important;
  right: 6px !important;
}
#volume-chart {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 85px;
  margin-top: 4px;
  margin-bottom: 16px;
}
.no-chart {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 16px;
}

/* ── 注意處置 Tab ────────────────────────────── */
.alert-section { padding: 14px; }
.alert-cat-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  margin-top: 16px;
}
.alert-cat-title:first-child { margin-top: 0; }
.alert-card {
  background: var(--surface);
  border: 1px solid rgba(240,180,41,0.2);
  border-left: 3px solid var(--gold);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.alert-name   { font-size: 20px; font-weight: 700; color: var(--text-bright); }
.alert-prices { font-size: 14px; color: var(--text-dim); margin-top: 3px; }
.alert-badge  {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 700;
  background: var(--gold-bg);
  border: 1px solid rgba(240,180,41,0.4);
  border-radius: 6px;
  padding: 5px 11px;
  color: var(--gold);
  white-space: nowrap;
}

/* ── Utilities ───────────────────────────────── */
.empty { text-align: center; padding: 28px; color: var(--text-dim); font-size: 16px; }
.spinner {
  width: 26px; height: 26px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

        <div class="strat-count-sub" id="strat-count-sub"></div>
      </div>
    </div>

    <div class="chart-legend" id="chart-legend" style="display:none">
      <div class="leg-item"><div class="leg-line" style="background:#00BFFF"></div>5日均線</div>
      <div class="leg-item"><div class="leg-line" style="background:#F0B429"></div>20日均線</div>
      <div class="leg-item"><div class="leg-line" style="background:#FFFFFF"></div>布林上/下軌</div>
      <div class="leg-item"><div class="leg-dash" style="border-color:#C084FC"></div>阻力</div>
      <div class="leg-item"><div class="leg-dash" style="border-color:#00D97A"></div>支撐</div>
    </div>

    <div id="main-chart"></div>
    <div id="volume-chart"></div>
  </div>
  </div><!-- /chart-panel -->

</div>

<!-- ══ 注意處置 ══ -->
<div id="alerts" class="tab-content">
  <div class="alert-section" id="alert-section">
    <div class="empty"><div class="spinner"></div></div>
  </div>
</div>

<div id="tracking" class="tab-content">
  <div class="alert-section" id="tracking-section">
    <div class="empty"><div class="spinner"></div></div>
  </div>
</div>

<script>
    let dashboardData = null;
    let mainChart     = null;
    let volumeChart   = null;
    let currentCode   = null;
    let currentType   = null;

    // ── Tab 切換
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    // ── 資料載入
    async function loadDashboardData() {
        if (window.dashboardData) {
            dashboardData = window.dashboardData;
            renderDashboard();
            return;
        }
        try {
            const res = await fetch('dashboard_data.json');
            if (!res.ok) throw new Error('fetch failed');
            dashboardData = await res.json();
            renderDashboard();
        } catch(e) {
            document.body.innerHTML = `<div style="padding:48px;text-align:center;color:#5A7A94">
                <p style="font-size:20px;margin-bottom:8px">無法加載儀表板資料</p>
                <p style="font-size:14px">${e.message}</p></div>`;
        }
    }

    function renderDashboard() {
        if (!dashboardData) return;
        const d = dashboardData.date;
        document.getElementById('date-badge').textContent =
            `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
        buildRecCards();
        renderAlerts();
        renderTracking();
    }

    // ── 推薦卡片清單（per-strategy，每策略最多 3 支）
    function buildRecCards() {
        const rec  = dashboardData.daily_recommendations;
        const shortByStrat = rec.short_by_strategy || {};
        const longByStrat  = rec.long_by_strategy  || {};

        // fallback：若無 per-strategy 資料，回退到 flat 清單各取 3
        const shortFallback = rec.short || [];
        const longFallback  = rec.long  || [];

        function makeCard(r, type, stratName) {
            const card = document.createElement('div');
            card.className = `rec-card ${type}-card`;
            card.dataset.code = r.code;

            const chg    = parseFloat(r.change_pct || 0);
            const chgStr = chg >= 0 ? `+${chg.toFixed(1)}%` : `${chg.toFixed(1)}%`;
            const chgCls = chg >= 0 ? 'cv-up' : 'cv-down';
            const cnt    = r.score || (r.strategies || []).length || 1;
            const maxCnt = type === 'short' ? 6 : 4;

            card.innerHTML = `
                <div class="rc-left">
                    <div class="rc-name">${r.code} <span style="font-weight:900">${r.name}</span></div>
                    <div class="rc-strats">${stratName}</div>
                </div>
                <div class="rc-right">
                    <div class="rc-price">${r.price > 0 ? r.price : '—'}</div>
                    <div class="rc-change ${chgCls}">${chgStr}</div>
                </div>`;

            card.onclick = () => showChart(r.code, type, card);
            return card;
        }

        function makeStratSection(container, stratName, stocks, type) {
            if (!stocks || !stocks.length) return;
            const wrap = document.createElement('div');
            wrap.style.cssText = 'margin-bottom:14px';

            const label = document.createElement('div');
            label.style.cssText = `font-size:12px;font-weight:800;letter-spacing:1.5px;
                color:${type==='short'?'var(--short)':'var(--long)'};
                margin-bottom:5px;padding-left:2px;opacity:0.8`;
            label.textContent = stratName;
            wrap.appendChild(label);

            stocks.forEach(r => wrap.appendChild(makeCard(r, type, stratName)));
            container.appendChild(wrap);
        }

        const shortCards = document.getElementById('short-cards');
        const longCards  = document.getElementById('long-cards');

        if (Object.keys(shortByStrat).length) {
            Object.entries(shortByStrat).forEach(([name, stocks]) =>
                makeStratSection(shortCards, name, stocks, 'short'));
        } else {
            shortFallback.slice(0,3).forEach(r =>
                shortCards.appendChild(makeCard(r, 'short', (r.strategies||[]).join('+')||r.reason||'—')));
        }

        if (Object.keys(longByStrat).length) {
            Object.entries(longByStrat).forEach(([name, stocks]) =>
                makeStratSection(longCards, name, stocks, 'long'));
        } else {
            longFallback.slice(0,3).forEach(r =>
                longCards.appendChild(makeCard(r, 'long', (r.strategies||[]).join('+')||r.reason||'—')));
        }

        // 自動選第一支空方第一策略的第一檔（不傳 card，panel 不展開）
        const firstShortStrat = Object.values(shortByStrat)[0] || shortFallback;
        const firstLongStrat  = Object.values(longByStrat)[0]  || longFallback;
        const first = (firstShortStrat[0]) || (firstLongStrat[0]);
        if (first) showChart(first.code, firstShortStrat[0] ? 'short' : 'long', null);
    }

    // ── 顯示圖表（再點同一張 → 收合）
    function showChart(code, type, clickedCard) {
        const chartPanel = document.getElementById('chart-panel');

        // 再點已選中的卡片 → 收合並取消選取
        if (clickedCard && clickedCard.classList.contains('sel')) {
            clickedCard.classList.remove('sel');
            chartPanel.style.display = 'none';
            currentCode = null;
            currentType = null;
            return;
        }

        currentCode = code;
        currentType = type;
        const rec  = dashboardData.daily_recommendations;
        const allStocks = [
            ...Object.values(rec.short_by_strategy || {}).flat(),
            ...Object.values(rec.long_by_strategy  || {}).flat(),
            ...(rec.short || []),
            ...(rec.long  || []),
        ];
        const item = allStocks.find(r => r.code === code) || null;

        // 卡片高亮（只高亮被點到的那張）
        document.querySelectorAll('.rec-card').forEach(c => c.classList.remove('sel'));
        if (clickedCard) {
            clickedCard.classList.add('sel');
        } else {
            document.querySelectorAll(`.rec-card[data-code="${code}"]`)[0]?.classList.add('sel');
        }

        // 把 chart-panel 插到被點擊卡片的正下方
        if (clickedCard) {
            clickedCard.after(chartPanel);
            chartPanel.style.display = 'block';
            // 重設動畫
            chartPanel.style.animation = 'none';
            requestAnimationFrame(() => { chartPanel.style.animation = ''; });
        }

        // chart info bar
        const infoEl = document.getElementById('chart-info');
        if (item) {
            infoEl.style.display = 'flex';
            document.getElementById('ci-name').textContent = item.name;
            document.getElementById('ci-code').textContent = item.code;

            const p = item.price;
            const priceEl = document.getElementById('ci-price');
            priceEl.textContent = p > 0 ? Number(p).toLocaleString() : 'N/A';

            // 股價顏色：依最新 K 線紅K/黑K 決定（紅=漲=紅色，黑=跌=綠色）
            const pdata = dashboardData.price_data?.[code];
            let priceColor = 'cv-up'; // 預設紅
            if (pdata?.closes?.length >= 2) {
                const last = pdata.closes[pdata.closes.length - 1];
                const prev = pdata.closes[pdata.closes.length - 2];
                priceColor = last >= prev ? 'cv-up' : 'cv-down';
            } else if (pdata?.opens?.length) {
                const last  = pdata.closes[pdata.closes.length - 1];
                const open  = pdata.opens[pdata.opens.length - 1];
                priceColor = last >= open ? 'cv-up' : 'cv-down';
            }
            priceEl.className = 'ci-price ' + priceColor;

            // 今日 K 棒圖示
            drawKBarSvg(pdata);

            const adv = item.advice || {};
            document.getElementById('ci-type-label').textContent = type === 'short' ? '空' : '多';
            document.getElementById('ci-entry').textContent = adv.entry > 0 ? adv.entry : (p || '—');
            document.getElementById('ci-stop').textContent  = adv.stop_loss > 0 ? adv.stop_loss : '—';

            // ── 觸發策略 pills + 策略強度 dots ───────────────────
            const analysisRow = document.getElementById('analysis-row');
            const strategies  = item.strategies || (item.reason ? item.reason.split('+').map(s=>s.trim()).filter(Boolean) : []);
            const stratCount  = item.score || strategies.length || 1;
            const maxDots     = type === 'short' ? 6 : 4;

            // 觸發策略 pills
            document.getElementById('chip-content').innerHTML =
                strategies.length
                    ? strategies.map(s => `<div class="strat-pill">${s}</div>`).join('')
                    : '<div class="strat-pill" style="opacity:0.5">—</div>';

            // 策略強度 dots
            document.getElementById('warn-title').textContent = '策略強度';
            document.getElementById('star-row').innerHTML =
                Array.from({length: maxDots}, (_, i) =>
                    `<div class="${i < stratCount ? 'dot-on' : 'dot-off'}"></div>`
                ).join('');
            document.getElementById('warn-label').textContent = `${stratCount}`;
            document.getElementById('strat-count-sub').textContent =
                `/ ${maxDots} 策略`;
            analysisRow.style.display = 'flex';
        } else {
            infoEl.style.display = 'none';
            drawKBarSvg(null);
            document.getElementById('analysis-row').style.display = 'none';
        }

        const data = dashboardData.price_data?.[code];
        if (!data || !data.closes?.length) {
            document.getElementById('main-chart').innerHTML =
                '<div class="no-chart">此標的無 K 線資料</div>';
            if (volumeChart) { volumeChart.destroy(); volumeChart = null; }
            document.getElementById('volume-chart').innerHTML = '';
            document.getElementById('chart-legend').style.display = 'none';
            return;
        }
        document.getElementById('chart-legend').style.display = 'flex';
        renderMainChart(code, data, item, type);
        renderVolumeChart(code, data);
    }

    // ── 今日 K 棒 SVG 圖示
    function drawKBarSvg(pdata) {
        const svg = document.getElementById('ci-candle');
        if (!svg) return;
        if (!pdata?.closes?.length || !pdata.opens?.length) {
            svg.style.display = 'none'; return;
        }
        const n = pdata.closes.length - 1;
        const o = pdata.opens[n]  ?? pdata.closes[n];
        const h = pdata.highs?.[n] ?? Math.max(o, pdata.closes[n]);
        const l = pdata.lows?.[n]  ?? Math.min(o, pdata.closes[n]);
        const c = pdata.closes[n];

        const isUp  = c >= o;
        const color = isUp ? '#FF4560' : '#00D97A';
        const W = 22, H = 58, PAD = 3;
        const range = (h - l) || 0.01;
        const sc = y => PAD + (1 - (y - l) / range) * (H - PAD * 2);

        const yH   = sc(h);
        const yL   = sc(l);
        const yTop = Math.min(sc(o), sc(c));
        const yBot = Math.max(sc(o), sc(c));
        const bH   = Math.max(yBot - yTop, 2);
        const cx   = W / 2;

        svg.innerHTML =
            `<line x1="${cx}" y1="${yH.toFixed(1)}" x2="${cx}" y2="${yL.toFixed(1)}"
                   stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>` +
            `<rect x="${(cx-5).toFixed(1)}" y="${yTop.toFixed(1)}"
                   width="10" height="${bH.toFixed(1)}"
                   fill="${color}" rx="1.5"/>`;
        svg.style.display = 'block';
    }

    // ── K 線主圖
    function renderMainChart(code, data, item, type) {
        if (mainChart) { mainChart.destroy(); mainChart = null; }

        const candleData = data.dates.map((d, i) => ({
            x: new Date(d).getTime(),
            y: [data.opens?.[i] ?? data.closes[i],
                data.highs?.[i] ?? data.closes[i],
                data.lows?.[i]  ?? data.closes[i],
                data.closes[i]]
        }));

        const series = [{ name: 'K線', type: 'candlestick', data: candleData }];

        // 通用 line series 產生器（處理不同長度的對齊偏移）
        const mkLine = (arr, name, color) => {
            if (!arr?.length) return null;
            const offset = data.dates.length - arr.length;
            return {
                name, type: 'line', color,
                data: data.dates.map((d, i) => {
                    const ai = i - offset;
                    return (ai >= 0 && arr[ai] != null)
                        ? { x: new Date(d).getTime(), y: parseFloat(arr[ai].toFixed(2)) } : null;
                }).filter(Boolean)
            };
        };

        // 5MA
        if (data.ma5?.length) {
            const s = mkLine(data.ma5, '5日均線', '#00BFFF');
            if (s) series.push(s);
        }

        // BB
        const bb = data.bollinger_bands;
        if (bb?.sma?.length) {
            const s20  = mkLine(bb.sma,   '20日均線', '#F0B429');
            const sUp  = mkLine(bb.upper, '布林上軌', '#ffffff');
            const sDn  = mkLine(bb.lower, '布林下軌', '#ffffff');
            if (s20)  series.push(s20);
            if (sUp)  series.push(sUp);
            if (sDn)  series.push(sDn);
        }

        // annotations
        const annotations = { yaxis: [] };
        const adv = item?.advice || {};

        if (adv.resistance > 0) annotations.yaxis.push({
            y: adv.resistance, borderColor:'#C084FC', borderWidth:1,
            strokeDashArray:5, opacity:0.8,
            label:{ text:`阻力 ${adv.resistance}`, position:'left',
                style:{ background:'rgba(192,132,252,0.18)', color:'#C084FC',
                    fontSize:'12px', fontWeight:700,
                    padding:{left:6,right:6,top:3,bottom:3} } }
        });
        if (adv.support > 0) annotations.yaxis.push({
            y: adv.support, borderColor:'#00D97A', borderWidth:1,
            strokeDashArray:5, opacity:0.8,
            label:{ text:`支撐 ${adv.support}`, position:'left',
                style:{ background:'rgba(0,217,122,0.15)', color:'#00D97A',
                    fontSize:'12px', fontWeight:700,
                    padding:{left:6,right:6,top:3,bottom:3} } }
        });
        if (adv.entry > 0) annotations.yaxis.push({
            y: adv.entry, borderColor:'#F0B429', borderWidth:2,
            strokeDashArray:0, opacity:1,
            label:{ text:`${type==='short'?'空':'多'} ${adv.entry}`, position:'left',
                style:{ background:'rgba(240,180,41,0.22)', color:'#F0B429',
                    fontSize:'13px', fontWeight:800,
                    padding:{left:8,right:8,top:4,bottom:4} } }
        });
        if (adv.stop_loss > 0) annotations.yaxis.push({
            y: adv.stop_loss, borderColor:'#FF6B6B', borderWidth:2,
            strokeDashArray:0, opacity:1,
            label:{ text:`損 ${adv.stop_loss}`, position:'left',
                style:{ background:'rgba(255,69,96,0.2)', color:'#FF6B6B',
                    fontSize:'13px', fontWeight:800,
                    padding:{left:8,right:8,top:4,bottom:4} } }
        });

        // ── 標籤錯位：避免 Y 值相近的標籤互相覆蓋 ────────────────
        if (annotations.yaxis.length > 1) {
            // 1. 按價格由高到低排序（螢幕由上到下）
            annotations.yaxis.sort((a, b) => b.y - a.y);
            // 2. 估算每個價格單位對應的像素數（主圖高度約 260px）
            const allPx = [...(data.highs||[]), ...(data.lows||[])].filter(v => v > 0);
            const pRange = allPx.length
                ? Math.max(...allPx) - Math.min(...allPx) : 50;
            const pxPerUnit = 260 / (pRange || 50);
            const MIN_GAP = 24;   // 每個標籤最少間距（px）
            let cumOff = 0;
            for (let i = 1; i < annotations.yaxis.length; i++) {
                const priceDiff = annotations.yaxis[i-1].y - annotations.yaxis[i].y; // >=0
                const pixelDiff = priceDiff * pxPerUnit - cumOff;
                if (pixelDiff < MIN_GAP) {
                    cumOff += (MIN_GAP - pixelDiff);
                    annotations.yaxis[i].label.offsetY = Math.round(cumOff);
                } else {
                    cumOff = 0;
                }
            }
        }

        const opts = {
            chart: {
                type:'candlestick', height:320, id:'candles', group:'stock',
                background:'#0F1520', foreColor:'#5A7A94',
                toolbar:{ show:true, tools:{ download:false, selection:true, zoom:true,
                    zoomin:true, zoomout:true, pan:true, reset:true } },
                animations:{ enabled:false },
            },
            theme:{ mode:'dark' },
            series,
            annotations,
            colors:['#26a69a','#00BFFF','#F0B429','#ffffff','#ffffff'],
            stroke:{ width:[1,1,2,2.5,2.5], dashArray:[0,0,0,0,0], curve:'smooth' },
            fill:{ type:'solid', opacity:[1,1,1,1,1] },
            xaxis:{
                type:'datetime',
                labels:{ style:{ colors:'#5A7A94', fontSize:'11px' } },
                axisBorder:{ color:'#1C2B3A' }, axisTicks:{ color:'#1C2B3A' }
            },
            yaxis:{
                labels:{ style:{ colors:'#5A7A94', fontSize:'11px' },
                    formatter: v => v?.toFixed(1) },
                tooltip:{ enabled:true }
            },
            grid:{ borderColor:'#1C2B3A' },
            plotOptions:{
                candlestick:{ colors:{ upward:'#FF4560', downward:'#00D97A' },
                    wick:{ useFillColor:true } }
            },
            tooltip:{ theme:'dark', x:{ format:'yyyy/MM/dd' } },
            legend:{ show:false }
        };

        mainChart = new ApexCharts(document.getElementById('main-chart'), opts);
        mainChart.render();
    }

    // ── 成交量圖
    function renderVolumeChart(code, data) {
        if (volumeChart) { volumeChart.destroy(); volumeChart = null; }
        if (!data.volumes?.length) return;

        const volData = data.dates.map((d, i) =>
            ({ x: new Date(d).getTime(), y: data.volumes[i] }));
        const colors = data.dates.map((_, i) => {
            const c = data.closes[i];
            const o = data.opens?.[i] ?? data.closes[i];
            return c >= o ? '#FF4560' : '#00D97A';  // 紅K=紅, 黑K=綠
        });

        const opts = {
            chart:{
                type:'bar', height:90, id:'volume', group:'stock',
                background:'#0F1520', foreColor:'#5A7A94',
                toolbar:{ show:false }, animations:{ enabled:false },
                brush:{ target:'candles', enabled:true }
            },
            theme:{ mode:'dark' },
            series:[{ name:'成交量', data:volData }],
            colors,
            plotOptions:{ bar:{ columnWidth:'80%', distributed:true } },
            legend:{ show:false },
            xaxis:{ type:'datetime', labels:{ show:false }, axisBorder:{ color:'#1C2B3A' } },
            yaxis:{ labels:{
                formatter: v => v>1000000?`${(v/1000000).toFixed(1)}M`:`${(v/1000).toFixed(0)}K`,
                style:{ colors:'#5A7A94', fontSize:'10px' }
            }},
            grid:{ borderColor:'#1C2B3A' },
            tooltip:{ theme:'dark', x:{ format:'yyyy/MM/dd' },
                y:{ formatter: v => v?.toLocaleString()+' 張' } }
        };

        volumeChart = new ApexCharts(document.getElementById('volume-chart'), opts);
        volumeChart.render();
    }

    // ── 注意處置 Tab
    function renderAlerts() {
        const disposal = dashboardData.daily_recommendations.disposal_alert ?? [];
        const bounce   = dashboardData.daily_recommendations.bounce_candidates ?? [];

        // 兩個都空才顯示「無資料」
        if (!disposal.length && !bounce.length) {
            document.getElementById('alert-section').innerHTML =
                '<div class="empty">目前無注意處置標的</div>';
            return;
        }

        // ── 反彈候選（最上方，綠色）──────────────────────────
        let bounceHtml = '';
        if (bounce.length) {
            bounceHtml = `<div class="alert-cat-title">
                <span class="section-bar" style="background:var(--short)"></span>
                處置中 → 反彈候選（做多）</div>`;
            bounce.forEach(b => {
                // 安全顯示數字（防 0 / NaN）
                const price    = (b.current_price > 0) ? b.current_price.toFixed(2) : '—';
                const peak     = (b.start_price > 0) ? b.start_price.toFixed(2) : '—';
                const dropPct  = (typeof b.drop_pct === 'number') ? Math.abs(b.drop_pct).toFixed(1) + '%' : '—';
                const ma20     = (b.ma20 > 0) ? b.ma20.toFixed(2) : '—';
                const slope    = (typeof b.ma_slope === 'number') ? b.ma_slope.toFixed(3) : '—';
                const daysIn   = b.days_in > 0 ? `第${b.days_in}天` : '';

                bounceHtml += `<div class="alert-card" style="border-left:3px solid var(--short);border-color:rgba(0,217,122,0.3)">
                    <div>
                        <div class="alert-name" style="color:var(--short)">${b.code} ${b.name}<span style="font-size:11px;color:#888;margin-left:6px">${daysIn}</span></div>
                        <div class="alert-prices">
                            高點 ${peak} → 現價 ${price}（回落 ${dropPct}）
                        </div>
                        <div class="alert-prices" style="margin-top:3px">
                            月線 ${ma20}（斜率 +${slope}）
                        </div>
                    </div>
                    <div class="alert-badge" style="background:rgba(0,217,122,0.12);border-color:rgba(0,217,122,0.4);color:var(--short)">
                        做多候選
                    </div>
                </div>`;
            });
        }

        // ── 注意處置預警（分類）────────────────────────────────
        const cats = {
            '注意處置預警':    [],
            '注意處置中':      [],
            '必中（今日達標）': [],
            '連N／接近門檻':   [],
        };
        disposal.forEach(a => {
            const s = a.status || '';
            if      (s.includes('即將處置') || s.includes('注意中'))    cats['注意處置預警'].push(a);
            else if (s.includes('已處置')   || s.includes('處置中'))    cats['注意處置中'].push(a);
            else if (s.includes('必中')     || s.includes('今日達標'))  cats['必中（今日達標）'].push(a);
            else                                                          cats['連N／接近門檻'].push(a);
        });

        let html = '';
        for (const [cat, items] of Object.entries(cats)) {
            if (!items.length) continue;
            html += `<div class="alert-cat-title">
                <span class="section-bar bar-gold"></span>${cat}</div>`;
            items.forEach(a => {
                const up      = (a.upper_price > 0) ? a.upper_price.toFixed(2) : '—';
                const dn      = (a.lower_price > 0) ? a.lower_price.toFixed(2) : '—';
                const curPx   = (a.current_price > 0) ? a.current_price.toFixed(2) : '—';
                const chg     = (typeof a.change_pct === 'number') ? `（${a.change_pct >= 0 ? '+' : ''}${a.change_pct.toFixed(1)}%）` : '';
                const days    = a.days_in > 0 ? `第 ${a.days_in} 天` : '';
                const isDisposed = (a.status || '').includes('已處置');
                html += `<div class="alert-card">
                    <div>
                        <div class="alert-name">${a.code} ${a.name}${days ? `<span style="font-size:11px;color:#888;margin-left:6px">${days}</span>` : ''}</div>
                        <div class="alert-prices">
                            ${isDisposed
                                ? `現價 ${curPx}${chg}`
                                : `現價 ${curPx}${chg}　進處置門檻 ↑${up} ／ ↓${dn}`
                            }
                        </div>
                    </div>
                    <div class="alert-badge">${a.status}</div>
                </div>`;
            });
        }
        document.getElementById('alert-section').innerHTML = bounceHtml + html;
    }

    // ── 延伸追蹤 Tab
    function renderTracking() {
        const tracking = dashboardData.tracking ?? { short: [], long: [] };
        const shorts = tracking.short ?? [];
        const longs  = tracking.long  ?? [];
        const trackDate = tracking.date ?? dashboardData.date;
        const dateLabel = trackDate
            ? `${trackDate.slice(0,4)}/${trackDate.slice(4,6)}/${trackDate.slice(6,8)}`
            : '';

        if (!shorts.length && !longs.length) {
            document.getElementById('tracking-section').innerHTML =
                '<div class="empty">今日無延伸追蹤機會</div>';
            return;
        }

        let html = '';

        // ── 延伸做空
        if (shorts.length) {
            html += `<div class="alert-cat-title">
                <span class="section-bar" style="background:var(--short)"></span>
                延伸做空（${dateLabel}）</div>`;
            shorts.forEach(r => {
                const flagDate  = r['標記日期'] ?? '—';
                const flagPrice = r['標記價']   ?? '—';
                const signal    = r['signal']    ?? '—';
                const note      = r['entry_note'] ?? '';
                html += `<div class="alert-card" style="border-left:3px solid var(--short)">
                    <div style="flex:1">
                        <div class="alert-name" style="color:var(--short)">${r['代號']} ${r['名稱']}
                            <span style="font-size:11px;color:#888;margin-left:6px">標記 ${flagDate} @ ${flagPrice}</span>
                        </div>
                        <div class="alert-prices" style="margin-top:4px">訊號：${signal}</div>
                        ${note ? `<div class="alert-prices" style="margin-top:2px;color:#A0A0B0">切入：${note}</div>` : ''}
                    </div>
                    <div class="alert-badge" style="background:var(--short-bg);border-color:rgba(0,217,122,0.4);color:var(--short)">
                        做空
                    </div>
                </div>`;
            });
        }

        // ── 延伸做多
        if (longs.length) {
            html += `<div class="alert-cat-title" style="margin-top:${shorts.length ? '20px' : '0'}">
                <span class="section-bar" style="background:var(--long)"></span>
                延伸做多（${dateLabel}）</div>`;
            longs.forEach(r => {
                const flagDate   = r['標記日期']  ?? '—';
                const flagPrice  = r['標記價']    ?? '—';
                const signal     = r['signal']     ?? '—';
                const note       = r['entry_note'] ?? '';
                const ma20       = (r.ma20   > 0) ? r.ma20.toFixed(2)   : '—';
                const slope      = (typeof r.ma_slope === 'number') ? `+${r.ma_slope.toFixed(3)}` : '—';
                const shadowPct  = (r.shadow_pct > 0) ? `${r.shadow_pct.toFixed(1)}%` : '—';
                html += `<div class="alert-card" style="border-left:3px solid var(--long)">
                    <div style="flex:1">
                        <div class="alert-name" style="color:var(--long)">${r['代號']} ${r['名稱']}
                            <span style="font-size:11px;color:#888;margin-left:6px">標記 ${flagDate} @ ${flagPrice}</span>
                        </div>
                        <div class="alert-prices" style="margin-top:4px">訊號：${signal}</div>
                        <div class="alert-prices" style="margin-top:2px">
                            月線 ${ma20}（斜率 ${slope}）　下引線 ${shadowPct}
                        </div>
                        ${note ? `<div class="alert-prices" style="margin-top:2px;color:#A0A0B0">切入：${note}</div>` : ''}
                    </div>
                    <div class="alert-badge" style="background:var(--long-bg);border-color:rgba(255,69,96,0.4);color:var(--long)">
                        做多
                    </div>
                </div>`;
            });
        }

        document.getElementById('tracking-section').innerHTML = html;
    }

    loadDashboardData();
</script>
</body>
</html>
